name: Tests

on:
  push:
    branches:
      - main
    paths:
      - "**/*.py"
      - "requirements.txt"
      - "pyproject.toml"
      - "uv.lock"

  pull_request:
    branches:
      - main
    paths:
      - "**/*.py"
      - "requirements.txt"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  test:
    name: Test
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.15"
          python-version: "3.14.5"
          enable-cache: true
          cache-python: true
          prune-cache: false

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
